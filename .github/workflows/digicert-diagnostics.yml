name: 'DigiCert Diagnostics'

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Decode client certificate
        shell: bash
        run: |
          echo "${{ secrets.DIGICERT_CLIENT_AUTH_CERT }}" | base64 --decode > "${RUNNER_TEMP}/sm_client_cert.p12"
          echo "SM_CLIENT_CERT_FILE=${RUNNER_TEMP}/sm_client_cert.p12" >> "$GITHUB_ENV"

      - name: Check secrets are populated
        shell: pwsh
        run: |
          function Check($name, $val) {
            if ([string]::IsNullOrEmpty($val)) { Write-Host "MISSING: $name" }
            else {
              $m = $val.Substring(0,4) + "..." + $val.Substring($val.Length - 4)
              Write-Host "OK: $name = $m (len=$($val.Length))"
            }
          }
          Check "DIGICERT_HOST" "${{ secrets.DIGICERT_HOST }}"
          Check "DIGICERT_KEY_LOCKER_API_KEY" "${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}"
          Check "DIGICERT_CLIENT_AUTH_PASS" "${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}"
          Check "DIGICERT_CODE_SIGNING_SHA1_HASH" "${{ secrets.DIGICERT_CODE_SIGNING_SHA1_HASH }}"

          $f = $env:SM_CLIENT_CERT_FILE
          if (Test-Path $f) {
            Write-Host "OK: Client cert file ($((Get-Item $f).Length) bytes)"
          } else {
            Write-Host "MISSING: Client cert file at $f"
          }

      - name: Setup Software Trust Manager
        uses: digicert/code-signing-software-trust-action@v1
        env:
          SM_HOST: ${{ secrets.DIGICERT_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}

      - name: smctl diagnostics
        shell: pwsh
        env:
          SM_HOST: ${{ secrets.DIGICERT_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}
        run: |
          Write-Host "=== smctl version ==="
          smctl --version

          Write-Host "`n=== smctl healthcheck ==="
          smctl healthcheck 2>&1 | Write-Host
          Write-Host "(exit: $LASTEXITCODE)"

          Write-Host "`n=== keypair list ==="
          smctl keypair ls 2>&1 | Write-Host
          Write-Host "(exit: $LASTEXITCODE)"

          Write-Host "`n=== certificate list ==="
          smctl certificate ls 2>&1 | Write-Host
          Write-Host "(exit: $LASTEXITCODE)"

      - name: Test signing a dummy file
        shell: pwsh
        env:
          SM_HOST: ${{ secrets.DIGICERT_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ env.SM_CLIENT_CERT_FILE }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}
        run: |
          Copy-Item "C:\Windows\System32\whoami.exe" "test_sign.exe"

          Write-Host "=== Signing test_sign.exe ==="
          smctl sign --fingerprint "${{ secrets.DIGICERT_CODE_SIGNING_SHA1_HASH }}" --input "test_sign.exe" 2>&1 | Write-Host
          Write-Host "(exit: $LASTEXITCODE)"

          Write-Host "`n=== Verifying ==="
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          & $signtool verify /pa "test_sign.exe" 2>&1 | Write-Host
          Write-Host "(exit: $LASTEXITCODE)"
