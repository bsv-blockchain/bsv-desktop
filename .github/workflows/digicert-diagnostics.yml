name: 'DigiCert Diagnostics'

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Decode client certificate
        shell: bash
        run: |
          echo "${{ secrets.DIGICERT_CLIENT_AUTH_CERT }}" | base64 --decode > /d/sm_client_cert.p12

      - name: Check secrets are populated
        shell: pwsh
        run: |
          function Check($name, $val) {
            if ([string]::IsNullOrEmpty($val)) { Write-Host "MISSING: $name" }
            else {
              $m = $val.Substring(0,4) + "..." + $val.Substring($val.Length - 4)
              Write-Host "OK: $name = $m (len=$($val.Length))"
            }
          }
          Check "DIGICERT_HOST" "${{ secrets.DIGICERT_HOST }}"
          Check "DIGICERT_KEY_LOCKER_API_KEY" "${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}"
          Check "DIGICERT_CLIENT_AUTH_PASS" "${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}"
          Check "DIGICERT_CODE_SIGNING_SHA1_HASH" "${{ secrets.DIGICERT_CODE_SIGNING_SHA1_HASH }}"
          if (Test-Path "D:\sm_client_cert.p12") {
            Write-Host "OK: Client cert file ($((Get-Item 'D:\sm_client_cert.p12').Length) bytes)"
          } else { Write-Host "MISSING: Client cert file" }

      # --- Test A: Simple signing mode (recommended) ---
      - name: "Test A - Simple signing setup"
        uses: digicert/code-signing-software-trust-action@v1
        with:
          simple-signing-mode: true
        env:
          SM_HOST: ${{ secrets.DIGICERT_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}
          SM_CLIENT_CERT_FILE: D:\sm_client_cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}

      - name: "Test A - smctl diagnostics"
        shell: pwsh
        env:
          SM_HOST: ${{ secrets.DIGICERT_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}
          SM_CLIENT_CERT_FILE: D:\sm_client_cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}
        run: |
          smctl --version
          smctl healthcheck 2>&1 | Write-Host
          smctl keypair ls 2>&1 | Write-Host
          smctl certificate ls 2>&1 | Write-Host

      - name: "Test A - Simple sign a test file"
        shell: pwsh
        env:
          SM_HOST: ${{ secrets.DIGICERT_HOST }}
          SM_API_KEY: ${{ secrets.DIGICERT_KEY_LOCKER_API_KEY }}
          SM_CLIENT_CERT_FILE: D:\sm_client_cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.DIGICERT_CLIENT_AUTH_PASS }}
        run: |
          Copy-Item "C:\Windows\System32\whoami.exe" "test_simple.exe"

          Write-Host "=== Simple sign with keypair alias ==="
          smctl sign --keypair-alias key_1503362452 --input "test_simple.exe" 2>&1 | Write-Host
          Write-Host "(exit: $LASTEXITCODE)"

          Write-Host "`n=== Simple sign with fingerprint ==="
          Copy-Item "C:\Windows\System32\whoami.exe" "test_fingerprint.exe"
          smctl sign --fingerprint "${{ secrets.DIGICERT_CODE_SIGNING_SHA1_HASH }}" --input "test_fingerprint.exe" 2>&1 | Write-Host
          Write-Host "(exit: $LASTEXITCODE)"

          Write-Host "`n=== Verify signatures ==="
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          foreach ($f in @("test_simple.exe", "test_fingerprint.exe")) {
            Write-Host "--- $f ---"
            & $signtool verify /pa $f 2>&1 | Write-Host
          }
